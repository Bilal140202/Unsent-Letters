<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Letters Feed - UnsentLetters</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js" defer></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans leading-normal tracking-normal">
    <header class="bg-white shadow-md py-4 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600"><a href="index.html">UnsentLetters</a></h1>
            <nav>
                <a href="post.html" class="bg-green-500 hover:bg-green-700 text-white font-bold py-2 px-4 rounded-lg ml-4">[Write a New Letter]</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        <h1 class="text-3xl font-semibold mb-6 text-center">Unsent Letters Feed</h1>

        <div id="tag-filter-buttons-container" class="flex flex-wrap justify-center gap-2 mb-8">
            <button class="tag-filter-btn bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-4 rounded-lg text-sm" data-tag="">All Tags</button>
            <button class="tag-filter-btn bg-pink-200 hover:bg-pink-300 text-pink-700 font-semibold py-2 px-4 rounded-lg text-sm" data-tag="Love">❤️ Love</button>
            <button class="tag-filter-btn bg-blue-200 hover:bg-blue-300 text-blue-700 font-semibold py-2 px-4 rounded-lg text-sm" data-tag="Regret">😔 Regret</button>
            <button class="tag-filter-btn bg-red-200 hover:bg-red-300 text-red-700 font-semibold py-2 px-4 rounded-lg text-sm" data-tag="Rage">😡 Rage</button>
            <button class="tag-filter-btn bg-yellow-200 hover:bg-yellow-300 text-yellow-700 font-semibold py-2 px-4 rounded-lg text-sm" data-tag="Gratitude">🙏 Gratitude</button>
            <button class="tag-filter-btn bg-indigo-200 hover:bg-indigo-300 text-indigo-700 font-semibold py-2 px-4 rounded-lg text-sm" data-tag="Goodbye">👋 Goodbye</button>
            <!-- Add more tags with appropriate color theming if desired -->
        </div>

        <section id="letters-feed-container" class="space-y-6">
            <p class="text-gray-500 text-center">Loading letters...</p>
            <!-- JS will populate this with letter items -->
            <!-- Example of how a letter item will be styled by JS:
            <div class="letter-item bg-white shadow-lg rounded-lg p-6 mb-6">
                <p class="letter-content text-gray-700 text-lg mb-4">Letter content goes here...</p>
                <div class="flex justify-between items-center">
                    <span class="letter-tag bg-blue-100 text-blue-800 text-xs font-semibold mr-2 px-2.5 py-0.5 rounded">#Tag</span>
                    <span class="letter-timestamp text-sm text-gray-500">Date and Time</span>
                </div>
            </div>
            -->
        </section>
    </main>

    <footer class="text-center py-6 mt-12 text-gray-600 text-sm">
        <p>&copy; 2023 UnsentLetters. Share your heart, anonymously.</p>
    </footer>
</body>
</html>
