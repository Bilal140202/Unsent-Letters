<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UnsentLetters</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js" defer></script>
</head>
<body class="bg-gray-100 text-gray-800 font-sans leading-normal tracking-normal">
    <header class="bg-white shadow-md py-4 px-6">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold text-blue-600">UnsentLetters</h1>
            <nav>
                <a href="feed.html" class="text-blue-500 hover:text-blue-700 ml-4">View Feed</a>
            </nav>
        </div>
    </header>

    <main class="container mx-auto p-4 md:p-8">
        <section id="hero" class="text-center py-12 bg-white shadow-lg rounded-lg mb-8">
            <h1 class="text-4xl font-bold mb-4">Write What You Never Said</h1>
            <p class="text-lg text-gray-600 mb-6">Sometimes, the hardest words are the ones left unspoken.</p>
            <a href="post.html" class="bg-blue-500 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg text-lg">[Write a Letter]</a>
        </section>

        <section id="feed-preview" class="mb-8">
            <h2 class="text-3xl font-semibold mb-6 text-center">Latest Letters</h2>
            <div id="feed-preview-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <p class="text-gray-500 col-span-full text-center">Loading letters...</p>
                <!-- JS will populate this -->
            </div>
            <div class="text-center mt-6">
                 <a href="feed.html" class="text-blue-500 hover:text-blue-700 font-semibold">View all letters &rarr;</a>
            </div>
        </section>

        <section id="search-filter-placeholders" class="bg-white shadow-md rounded-lg p-6">
            <h2 class="text-2xl font-semibold mb-4 text-center">Explore Letters</h2>
            <div class="flex flex-col md:flex-row justify-center items-center gap-4">
                <input type="text" placeholder="Search letters (coming soon)..." class="mt-1 block w-full md:w-1/2 px-3 py-2 bg-white border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-indigo-500 focus:border-indigo-500 sm:text-sm">
                <div class="flex flex-wrap justify-center gap-2 mt-2 md:mt-0">
                    <button class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-4 rounded-lg text-sm">Love</button>
                    <button class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-4 rounded-lg text-sm">Regret</button>
                    <button class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-4 rounded-lg text-sm">Apology</button>
                    <button class="bg-gray-200 hover:bg-gray-300 text-gray-700 font-semibold py-2 px-4 rounded-lg text-sm">Gratitude</button>
                </div>
            </div>
        </section>
    </main>

    <footer class="text-center py-6 mt-12 text-gray-600 text-sm">
        <p>&copy; 2023 UnsentLetters. Share your heart, anonymously.</p>
    </footer>
</body>
</html>
